# Registry of every pipeline this repo defines. Each entry
# below becomes an invocable target for `sparkwing run <name>`.
#
# Add an entry by running:
#   sparkwing pipeline new --name <name>
#
# (Default template is minimal; pass --template build-test-deploy
# for a build/test/deploy DAG.)
pipelines:
  # pre-commit: fast local gate (gofmt + go vet on .sparkwing/, repo-
  # wide regex sweeps for em dashes and internal tracker IDs). Fires
  # automatically after `sparkwing pipeline hooks install`.
  - name: pre-commit
    entrypoint: PreCommit
    tags: [checks, hooks]
    on:
      pre_commit: {}

  # pre-push: heavier last gate before main. Full golangci-lint,
  # `go test -race`, govulncheck, version-freshness check, and a
  # hard refusal to push if any committed go.mod has a `replace`.
  - name: pre-push
    entrypoint: PrePush
    tags: [checks, hooks]
    on:
      pre_push: {}

  - name: release-modules
    entrypoint: ReleaseModules
