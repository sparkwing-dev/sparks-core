name: docker-deploy-ecr-eks
description: |
  Build a Docker image, push to ECR, and deploy via gitops to EKS
  (or kubectl/kind on local). Mirrors the consumer apps
  build-test-deploy pattern: tests run before build, image gets
  multi-tag (sha + branch + prod), gitops bumps kustomize, ArgoCD
  syncs.
whenToUse: |
  Containerized app to ECR + gitops/EKS on AWS, no database migrations.
  Use for a stateless service deploy. If the deploy needs migrations and
  integration tests, use go-test-migrate-deploy-argo. If you apply k8s
  YAML directly with kubectl (no gitops), use go-test-build-deploy-k8s.
parameters:
  - name: image
    type: string
    required: true
    description: Image name (e.g. myapp)
  - name: ecr
    type: string
    required: true
    description: ECR registry URL (e.g. 633280902600.dkr.ecr.us-west-2.amazonaws.com)
  - name: gitops-repo
    type: string
    required: true
    description: SSH URL of the gitops repo (e.g. git@github.com:org/gitops.git)
  - name: gitops-path
    type: string
    required: true
    description: Path within the gitops repo (e.g. myorg/myapp)
  - name: app-name
    type: string
    required: true
    description: ArgoCD application name
  - name: namespace
    type: string
    required: true
    description: Kubernetes namespace
  - name: pipeline-name
    type: string
    description: Pipeline registration name -- the verb users type after `sparkwing run`.
    default: build-test-deploy
  - name: test-cmd
    type: string
    description: Pre-build test command. Empty disables the test step.
    default: go test ./...
applicability:
  cloud: [aws]
  category: docker-deploy
verify: compile-only
verify_params:
  image: example-app
  ecr: 123456789012.dkr.ecr.us-east-1.amazonaws.com
  gitops-repo: git@github.com:example/gitops.git
  gitops-path: apps/example
  app-name: example-app
  namespace: example
