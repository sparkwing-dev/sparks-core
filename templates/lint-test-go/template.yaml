name: lint-test-go
description: |
  CI hygiene gate for Go projects: gofmt, go vet, go test. The
  smallest useful template -- a good first read for people learning
  the SDK shape since it has zero external concerns (no clouds, no
  registries, no gitops).
whenToUse: |
  CI hygiene only (gofmt / vet / test), no build or deploy. Use as a PR
  gate, or as the first template to read when learning the SDK shape.
parameters:
  - name: go-version
    type: string
    description: Go version banner (informational; real version pinned in go.mod)
    default: "1.26"
  - name: pipeline-name
    type: string
    description: Pipeline registration name -- the verb users type after `sparkwing run`.
    default: lint-test
  - name: test-args
    type: string
    description: Additional args appended to `go test`.
    default: ./...
prerequisite: A Go module at the repo root (gofmt/vet/test run there); scaffolding into an empty repo runs but has nothing to check.
applicability:
  cloud: []
  category: ci-hygiene
