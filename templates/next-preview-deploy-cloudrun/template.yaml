name: next-preview-deploy-cloudrun
description: |
  Per-branch preview deploys for a server-rendered Next.js app on Cloud
  Run using tagged revisions. Build the branch image, push it to Google
  Artifact Registry, and deploy it as a `--tag <branch-slug> --no-traffic`
  revision -- a stable preview URL that never shifts production traffic --
  then print the tagged URL for the pull request. Cloud Run revision tags
  give per-branch preview environments with no extra infrastructure.
whenToUse: |
  Reach for this for ephemeral per-PR or per-branch preview environments of
  an SSR app on GCP: it reuses one Cloud Run service and spins a tagged
  revision per branch, so previews cost nothing when idle and need no
  teardown job. Choose docker-deploy-gar-cloudrun instead for the
  production (traffic-serving) deploy -- that one shifts live traffic and
  rolls it back on a failed probe, whereas this one deploys `--no-traffic`
  and never touches production. Static-export previews (S3/GCS) are a
  documented follow-up, not shipped here.
prerequisite: |
  A Dockerfile at the repo root that builds the Next.js standalone server
  and the gcloud CLI on PATH (for GAR auth and the Cloud Run deploy).
parameters:
  - name: image
    type: string
    required: true
    description: Image name (e.g. web)
  - name: gar
    type: string
    required: true
    description: GAR registry URL (e.g. us-west1-docker.pkg.dev/my-project/my-repo)
  - name: service
    type: string
    required: true
    description: Base Cloud Run service; previews land as tagged revisions on it
  - name: region
    type: string
    required: true
    description: GCP region (e.g. us-west1)
  - name: project
    type: string
    required: true
    description: GCP project ID
  - name: port
    type: string
    required: false
    default: "3000"
    description: Container port the Next server listens on
  - name: branch-ref
    type: string
    required: false
    default: ""
    description: Branch/ref the preview slug derives from; empty reads the dispatch-time branch (RunContext git snapshot).
  - name: test-cmd
    type: string
    required: false
    default: npm test
    description: Pre-build test command. Empty disables the test node.
  - name: pipeline-name
    type: string
    required: false
    default: preview
    description: Pipeline registration name -- the verb users type after `sparkwing run`.
applicability:
  cloud: [gcp]
  category: static-frontend
verify: compile-only
verify_fixture: docker
verify_params:
  image: web
  gar: us-central1-docker.pkg.dev/example-project/example-repo
  service: example-web
  region: us-central1
  project: example-project
  branch-ref: feature-login
