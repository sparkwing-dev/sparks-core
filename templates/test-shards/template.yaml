name: test-shards
description: |
  Run a test suite split into N parallel shards, gated by a node that
  passes only when every shard passes. The default splits the module's
  packages across shards, so an unedited scaffold really does divide the
  work. Runs end-to-end with `sparkwing run`; the canonical fan-out +
  fan-in gate shape.
whenToUse: |
  Speed up a large test suite by splitting its packages across parallel
  shards on a multi-runner fleet (a single local runner serializes the
  shards, so the wall-clock win needs more than one runner), or as a
  worked example of JobFanOut + an all-pass gate. For a single unsharded
  CI-hygiene gate use lint-test-go. To run the suite across a version or
  OS matrix (rather than splitting one suite) use test-matrix; to fail the
  build under a coverage threshold use coverage-gated-test. To cache each
  package's result independently (replay unchanged packages instead of
  spreading one suite for speed) use go-affected-tests.
parameters:
  - name: pipeline-name
    type: string
    description: Pipeline registration name -- the verb users type after `sparkwing run`.
    default: test-shards
  - name: shards
    type: string
    description: Number of parallel shards (a positive integer).
    default: "4"
  - name: test-cmd
    type: string
    description: |
      Test command run per shard. SHARD_INDEX (0-based) and SHARD_TOTAL
      are exported into its environment. The default splits the module's
      packages across shards by list position; replace it to shard with a
      test runner's native --shard flag or your own partition.
    default: "go test $(go list ./... | awk -v t=$SHARD_TOTAL -v i=$SHARD_INDEX 'NR % t == i')"
  - name: runner-label
    type: string
    description: |
      Optional runner label every shard prefers, applied as a soft Prefers
      so a single-runner setup still dispatches each shard. Empty runs
      shards wherever a runner is free.
    default: ""
prerequisite: A Go module + tests at the repo root (the default test-cmd runs `go test` over `go list ./...` there); scaffolding into an empty repo runs but the shards have nothing to test.
applicability:
  cloud: []
  category: testing-strategies
verify: runnable
verify_fixture: go-module
verify_params:
  pipeline-name: test-shards
  shards: "1"
  test-cmd: go test ./...
