name: docker-deploy-gar-gke
description: |
  Build a Docker image, push to Google Artifact Registry, and deploy
  via gitops to GKE. GCP mirror of docker-deploy-ecr-eks. Same shape,
  GCP backends.
whenToUse: |
  Containerized app to GAR + gitops/GKE on GCP. The GCP twin of
  docker-deploy-ecr-eks. Use for stateless services on GCP. If you apply
  k8s YAML directly with kubectl (no gitops/ArgoCD), use
  gke-deploy-gar-kubectl. For a serverless container with no cluster use
  docker-deploy-gar-cloudrun (from a prebuilt image) or
  cloudrun-deploy-source (deploy from source).
parameters:
  - name: image
    type: string
    required: true
    description: Image name (e.g. my-service)
  - name: gar
    type: string
    required: true
    description: GAR registry URL (e.g. us-west1-docker.pkg.dev/my-project/my-repo)
  - name: gitops-repo
    type: string
    required: true
    description: SSH URL of the gitops repo
  - name: gitops-path
    type: string
    required: true
    description: Path within the gitops repo (kustomize root)
  - name: app-name
    type: string
    required: true
    description: ArgoCD application name
  - name: namespace
    type: string
    required: true
    description: Kubernetes namespace
  - name: pipeline-name
    type: string
    description: Pipeline registration name -- the verb users type after `sparkwing run`.
    default: build-test-deploy
  - name: test-cmd
    type: string
    description: Pre-build test command. Empty disables the test step.
    default: go test ./...
applicability:
  cloud: [gcp]
  category: docker-deploy
verify: compile-only
verify_params:
  image: example-app
  gar: us-central1-docker.pkg.dev/example-project/example-repo
  gitops-repo: git@github.com:example/gitops.git
  gitops-path: apps/example
  app-name: example-app
  namespace: example
