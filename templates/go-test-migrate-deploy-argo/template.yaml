name: go-test-migrate-deploy-argo
description: |
  Run integration tests against an ephemeral Postgres, build a Docker
  image to ECR, run database migrations against the target database,
  then deploy via gitops + ArgoCD. A post-deploy HTTP probe verifies the
  new revision; an unhealthy result triggers an automatic gitops revert
  (rollback). A multi-node DAG (integration-test -> build -> migrate ->
  deploy) composed from sparks-core blocks.
whenToUse: |
  Reach for this when a deploy must run schema migrations and you ship
  through a gitops repo + ArgoCD -- the full stateful-service path:
  integration tests on a throwaway database, migrations on the real one,
  then a verified, self-rolling-back gitops deploy. Migrations run
  against the target database before deploy and are not reverted on
  rollback, so they must be backward-compatible (expand/contract): a
  failed, rolled-back deploy leaves the new schema running under the old
  code. If you have no migrations, use docker-deploy-ecr-eks. If you
  apply k8s YAML directly with kubectl, use go-test-build-deploy-k8s. To
  run migrations on their own (up/down, no build or deploy) use
  db-migrate-updown.
prerequisite: |
  A Dockerfile at the repo root, a golang-migrate migrations directory
  (migrations-dir), a gitops repo plus an ArgoCD application, and an EKS
  cluster. Needs docker, kubectl, git, and the migrate CLI on PATH; the
  sparkwing secret named by dsn-secret holding the target database DSN;
  gitops push credentials (GITHUB_TOKEN or an SSH deploy key); and ArgoCD
  access (SPARKWING_ARGOCD_SERVER + SPARKWING_ARGOCD_TOKEN, or running
  in-cluster).
parameters:
  - name: image
    type: string
    required: true
    description: Image name (e.g. myapp)
  - name: registry
    type: string
    required: true
    description: Container registry URL to push to (e.g. <acct>.dkr.ecr.<region>.amazonaws.com, us-west1-docker.pkg.dev/proj/repo, or ghcr.io/org).
  - name: gitops-repo
    type: string
    required: true
    description: SSH URL of the gitops repo (e.g. git@github.com:org/gitops.git)
  - name: gitops-path
    type: string
    required: true
    description: Path within the gitops repo (e.g. myorg/myapp)
  - name: app-name
    type: string
    required: true
    description: ArgoCD application name; also the deploy/<app-name> rolled back on failure
  - name: namespace
    type: string
    required: true
    description: Kubernetes namespace
  - name: health-url
    type: string
    required: true
    description: URL the post-deploy probe checks for a 2xx (e.g. https://myapp.example.com/healthz)
  - name: postgres-image
    type: string
    description: Postgres image for the ephemeral integration-test database. Pin this to match production.
    default: postgres:16-alpine
  - name: migrations-dir
    type: string
    description: golang-migrate migrations directory.
    default: db/migrations
  - name: dsn-secret
    type: string
    description: Name of the sparkwing secret holding the target database DSN.
    default: DATABASE_URL
  - name: health-retries
    type: string
    description: Number of post-deploy health-probe attempts before declaring the revision unhealthy.
    default: "30"
  - name: dockerfile
    type: string
    description: Path to the Dockerfile, relative to the build context.
    default: Dockerfile
  - name: pipeline-name
    type: string
    description: Pipeline registration name -- the verb users type after `sparkwing run`.
    default: test-migrate-deploy
  - name: test-cmd
    type: string
    description: Integration test command; runs with DATABASE_URL set to the ephemeral Postgres.
    default: go test -tags=integration ./...
applicability:
  cloud: [aws]
  category: docker-deploy
verify: compile-only
verify_params:
  image: example-app
  registry: 123456789012.dkr.ecr.us-east-1.amazonaws.com
  gitops-repo: git@github.com:example/gitops.git
  gitops-path: apps/example
  app-name: example-app
  namespace: example
  health-url: https://example.com/healthz
